          image: ${IMAGE}:${IMAGE_TAG}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /liveness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readiness
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 10
          volumes:
          - name: vertex-api
            secret:
              secretName: vertex-api
          - name: lightspeed-stack-config
            configMap:
              name: lightspeed-stack-config
          volumeMounts:
          - name: vertex-api
            mountPath: /opt/secrets
            readOnly: true
          - name: lightspeed-stack-config
            mountPath: /app-root/lightspeed-stack.yaml
            subPath: lightspeed-stack.yaml
            readOnly: true
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
          env:
          - name: LIGHTSPEED_STACK_CONFIG_PATH
            value: ${LIGHTSPEED_STACK_CONFIG_PATH}
          - name: VERTEX_PROJECT
            value: ${VERTEX_PROJECT}
          - name: VERTEX_LOCATION
            value: ${VERTEX_LOCATION}
          - name: ALLOWED_MODEL
            value: ${ALLOWED_MODEL}
          - name: VERTEX_SECRET_PATH
            value: ${VERTEX_SECRET_PATH}
