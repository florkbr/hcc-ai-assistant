---
apiVersion: v1
kind: Template
metadata:
  name: hcc-ai-assistant
objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: ClowdApp
    metadata: 
      name: hcc-ai-assistant
    spec:
      envName: ${ENV_NAME}
      database:
        name: hcc-ai-assistant
      featureFlags: true
      kafkaTopics:
      # one replica for now; most of this will change
      - replicas: 1
        partitions: 8
        topicName: platform.chrome
      deployments:
      - name: api
        minReplicas: ${{MIN_REPLICAS}}
        webServices:
            public:
              apiPath: hcc-ai-assistant
              enabled: true
        podSpec:
          image: ${IMAGE}:${IMAGE_TAG}
          initContainers:
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 120
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 120
          env: []

parameters:
- name: MIN_REPLICAS
  value: '3'
- description: Image tag
  name: IMAGE_TAG
  required: true
- description: Image name
  name: IMAGE
  value: TBD
- description: ClowdEnv Name
  name: ENV_NAME
  required: true
