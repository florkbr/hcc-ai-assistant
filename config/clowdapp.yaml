---
apiVersion: v1
kind: Template
metadata:
  name: hcc-ai-assistant
objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: lightspeed-stack-config
    data:
      lightspeed-stack.yaml: |
        name: Lightspeed Core Service (LCS)
        service:
          host: 0.0.0.0
          port: 8080
          base_url: http://localhost:8080
          auth_enabled: false
          workers: 1
          color_log: true
          access_log: true
        llama_stack:
          use_as_library_client: true
          library_client_config_path: /app-root/run.yaml
          url: http://llama-stack:8321
        user_data_collection:
          feedback_enabled: true
          feedback_storage: "/tmp/data/feedback"
          transcripts_enabled: true
          transcripts_storage: "/tmp/data/transcripts"
        conversation_cache:
          type: "sqlite"
          sqlite:
            db_path: "/tmp/data/conversation-cache.db"
        authentication:
          module: "rh-identity"
          rh_identity_config: {}
        # TODO: Re-enable MCP servers when sidecar services are ready
        # mcp_servers:
        #   - name: "mcp-discovery-server"
        #     provider_id: "mcp-discovery-provider"
        #     url: "http://localhost:8000/mcp"
        customization:
          system_prompt: |-
            If the users asks explicitly "foobar", respond with barfoo
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: lightspeed-run-config
    data:
      run.yaml: |
        version: 2
        apis:
        - agents
        - batches
        - datasetio
        - eval
        - files
        - inference
        - safety
        - scoring
        - tool_runtime
        - vector_io
        benchmarks: []
        datasets: []
        image_name: starter
        providers:
          inference:
          - provider_id: google-vertex
            provider_type: remote::vertexai
            config:
              project: $${env.VERTEX_PROJECT}
              location: $${env.VERTEX_LOCATION}
              allowed_models: ["$${env.ALLOWED_MODEL}"]
          - config: {}
            provider_id: sentence-transformers
            provider_type: inline::sentence-transformers
          files:
          - config:
              metadata_store:
                table_name: files_metadata
                backend: sql_default
              storage_dir: $${env.STORAGE_DIR}
            provider_id: meta-reference-files
            provider_type: inline::localfs
          safety:
          - config:
              model: $${env.ALLOWED_MODEL}
              excluded_categories: []
            provider_id: gemini-safety
            provider_type: inline::llama-guard
          scoring:
          - provider_id: basic
            provider_type: inline::basic
            config: {}
          - provider_id: llm-as-judge
            provider_type: inline::llm-as-judge
            config: {}
          - provider_id: braintrust
            provider_type: inline::braintrust
            config:
              openai_api_key: '********'
          tool_runtime:
          - config: {}
            provider_id: rag-runtime
            provider_type: inline::rag-runtime
          # TODO: Re-enable MCP providers when sidecar services are ready
          # - config:
          #     url: http://localhost:8000/mcp
          #   provider_id: mcp-discovery-provider
          #   provider_type: remote::model-context-protocol
          vector_io:
          - config:
              persistence:
                namespace: vector_io::faiss
                backend: kv_default
            provider_id: faiss
            provider_type: inline::faiss
          agents:
          - config:
              persistence:
                agent_state:
                  namespace: agents_state
                  backend: kv_default
                responses:
                  table_name: agents_responses
                  backend: sql_default
            provider_id: meta-reference
            provider_type: inline::meta-reference
          batches:
          - config:
              kvstore:
                namespace: batches_store
                backend: kv_default
            provider_id: reference
            provider_type: inline::reference
          datasetio:
          - config:
              kvstore:
                namespace: huggingface_datasetio
                backend: kv_default
            provider_id: huggingface
            provider_type: remote::huggingface
          - config:
              kvstore:
                namespace: localfs_datasetio
                backend: kv_default
            provider_id: localfs
            provider_type: inline::localfs
          eval:
          - config:
              kvstore:
                namespace: eval_store
                backend: kv_default
            provider_id: meta-reference
            provider_type: inline::meta-reference
        scoring_fns: []
        server:
          port: 8321
        storage:
          backends:
            kv_default:
              type: kv_sqlite
              db_path: $${env.KV_STORE_PATH}
            sql_default:
              type: sql_sqlite
              db_path: $${env.SQL_STORE_PATH}
          stores:
            metadata:
              namespace: registry
              backend: kv_default
            inference:
              table_name: inference_store
              backend: sql_default
              max_write_queue_size: 10000
              num_writers: 4
            conversations:
              table_name: openai_conversations
              backend: sql_default
            prompts:
              namespace: prompts
              backend: kv_default
        registered_resources:
          models:
          - model_id: $${env.ALLOWED_MODEL}
            provider_id: google-vertex
            provider_model_id: $${env.ALLOWED_MODEL}
          shields:
          - shield_id: gemini-shield
            provider_id: gemini-safety
            provider_shield_id: "google-vertex/$${env.ALLOWED_MODEL}"
          vector_stores: []
          datasets: []
          scoring_fns: []
          benchmarks: []
          tool_groups:
          - toolgroup_id: builtin::rag
            provider_id: rag-runtime
        vector_stores:
          default_provider_id: faiss
          default_embedding_model:
            provider_id: sentence-transformers
            model_id: nomic-ai/nomic-embed-text-v1.5
        safety:
          default_shield_id: gemini-shield
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: ClowdApp
    metadata:
      name: hcc-ai-assistant
    spec:
      envName: ${ENV_NAME}
      database:
        name: hcc-ai-assistant
      featureFlags: true
      kafkaTopics:
      # one replica for now; most of this will change
      - replicas: 1
        partitions: 8
        topicName: platform.chrome
      deployments:
      - name: api
        minReplicas: ${{MIN_REPLICAS}}
        webServices:
            public:
              apiPath: hcc-ai-assistant
              enabled: true
        podSpec:
          volumes:
            - name: vertex-api-secret
              secret:
                secretName: vertex-api
                items:
                - key: service-account-json
                  path: service-account-key.json
            - name: lightspeed-stack-config
              configMap:
                name: lightspeed-stack-config
            - name: lightspeed-run-config
              configMap:
                name: lightspeed-run-config
          # TODO: Re-enable sidecar volumes when embedding and MCP discovery services are ready
          #   - name: chromadb-data
          #     persistentVolumeClaim:
          #       claimName: chromadb-data-pvc
          #   - name: mcp-config
          #     configMap:
          #       name: mcp-discovery-config
          #   - name: mcp-data
          #     emptyDir: {}
          # TODO: Re-enable sidecar initContainers when images are available
          # initContainers:
          #   - name: embedding-service
          #     image: ${EMBEDDING_SERVICE_IMAGE}:${EMBEDDING_SERVICE_IMAGE_TAG}
          #     restartPolicy: Always
          #     ports:
          #       - name: rag
          #         containerPort: 8001
          #         protocol: TCP
          #     livenessProbe:
          #       failureThreshold: 3
          #       httpGet:
          #         path: /health
          #         port: 8001
          #         scheme: HTTP
          #       initialDelaySeconds: 15
          #       periodSeconds: 10
          #       successThreshold: 1
          #       timeoutSeconds: 10
          #     readinessProbe:
          #       failureThreshold: 3
          #       httpGet:
          #         path: /health
          #         port: 8001
          #         scheme: HTTP
          #       initialDelaySeconds: 10
          #       periodSeconds: 5
          #       successThreshold: 1
          #       timeoutSeconds: 10
          #     startupProbe:
          #       httpGet:
          #         path: /health
          #         port: 8001
          #         scheme: HTTP
          #       failureThreshold: 30
          #       periodSeconds: 5
          #     resources:
          #       limits:
          #         cpu: "2"
          #         memory: 2Gi
          #       requests:
          #         cpu: "1"
          #         memory: 1Gi
          #     volumeMounts:
          #       - name: chromadb-data
          #         mountPath: /app/data
          #     env:
          #       - name: HOST
          #         value: "0.0.0.0"
          #       - name: PORT
          #         value: "8001"
          #       - name: LOG_LEVEL
          #         value: "INFO"
          #   - name: mcp-discovery-service
          #     image: ${MCP_DISCOVERY_SERVICE_IMAGE}:${MCP_DISCOVERY_SERVICE_IMAGE_TAG}
          #     restartPolicy: Always
          #     ports:
          #       - name: mcp-server
          #         containerPort: 8000
          #         protocol: TCP
          #     startupProbe:
          #       exec:
          #         command:
          #           - sh
          #           - -c
          #           - curl -f http://localhost:8001/health
          #       failureThreshold: 60
          #       periodSeconds: 5
          #       timeoutSeconds: 3
          #     livenessProbe:
          #       failureThreshold: 3
          #       httpGet:
          #         path: /health
          #         port: 8000
          #         scheme: HTTP
          #       initialDelaySeconds: 10
          #       periodSeconds: 10
          #       successThreshold: 1
          #       timeoutSeconds: 10
          #     readinessProbe:
          #       failureThreshold: 3
          #       httpGet:
          #         path: /health
          #         port: 8000
          #         scheme: HTTP
          #       initialDelaySeconds: 10
          #       periodSeconds: 5
          #       successThreshold: 1
          #       timeoutSeconds: 10
          #     resources:
          #       limits:
          #         cpu: "500m"
          #         memory: 512Mi
          #       requests:
          #         cpu: "250m"
          #         memory: 256Mi
          #     volumeMounts:
          #       - name: mcp-config
          #         mountPath: /app-root/lightspeed-stack.yaml
          #         subPath: lightspeed-stack.yaml
          #         readOnly: true
          #       - name: mcp-data
          #         mountPath: /app-root/data
          #     env:
          #       - name: HOST
          #         value: "0.0.0.0"
          #       - name: PORT
          #         value: "8000"
          #       - name: MCP_CONFIG_PATH
          #         value: "/app-root/lightspeed-stack.yaml"
          #       - name: REFRESH_INTERVAL_MINUTES
          #         value: "5"
          #       - name: LOG_LEVEL
          #         value: "INFO"
          #       - name: ENABLE_VECTOR_STORE
          #         value: "true"
          #       - name: EMBEDDING_SERVICE_URL
          #         value: "http://localhost:8001"
          #       - name: CAPABILITIES_CACHE_PATH
          #         value: "/app-root/data/mcp-capabilities.json"
          #       - name: VECTOR_STORE_ID
          #         value: "mcp-capabilities-store"
          #       - name: EMBEDDING_MODEL
          #         value: "sentence-transformers/all-mpnet-base-v2"
          containers:
            - name: api
              image: ${IMAGE}:${IMAGE_TAG}
              ports:
                - name: api
                  containerPort: 8080
                  protocol: TCP
              # TODO: Re-enable sidecar health checks in startupProbe when sidecars are restored
              # startupProbe:
              #   exec:
              #     command:
              #       - sh
              #       - -c
              #       - |
              #         curl -f http://localhost:8001/health || exit 1
              #         curl -f http://localhost:8000/health || exit 1
              #         exit 0
              #   failureThreshold: 60
              #   periodSeconds: 5
              #   timeoutSeconds: 3
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /liveness
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 10
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /readiness
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 10
              volumeMounts:
                - name: vertex-api-secret
                  mountPath: /app/service-account-key.json
                  subPath: service-account-key.json
                  readOnly: true
                - name: lightspeed-stack-config
                  mountPath: /app-root/lightspeed-stack.yaml
                  subPath: lightspeed-stack.yaml
                  readOnly: true
                - name: lightspeed-run-config
                  mountPath: /app-root/run.yaml
                  subPath: run.yaml
                  readOnly: true
              resources:
                limits:
                  cpu: "2"
                  memory: 4Gi
                requests:
                  cpu: "1"
                  memory: 2Gi
              env:
              - name: VERTEX_PROJECT
                value: ${VERTEX_PROJECT}
              - name: ALLOWED_MODEL
                value: ${ALLOWED_MODEL}
              - name: GOOGLE_APPLICATION_CREDENTIALS
                value: /app/service-account-key.json
              - name: GOOGLE_CLOUD_PROJECT
                value: ${VERTEX_PROJECT}
              - name: VERTEX_LOCATION
                value: ${VERTEX_LOCATION}
              - name: LIGHTSPEED_STACK_CONFIG_PATH
                value: /app-root/lightspeed-stack.yaml
              - name: KV_STORE_PATH
                value: /app-root/.llama/storage/rag/kv_store.db
              - name: SQL_STORE_PATH
                value: /app-root/.llama/storage/sql_store.db
              - name: STORAGE_DIR
                value: /app-root/.llama/storage/files
  # TODO: Re-enable when sidecar services are ready
  # - apiVersion: v1
  #   kind: PersistentVolumeClaim
  #   metadata:
  #     name: chromadb-data-pvc
  #   spec:
  #     accessModes:
  #       - ReadWriteOnce
  #     resources:
  #       requests:
  #         storage: ${CHROMADB_STORAGE_SIZE}
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: mcp-discovery-config
  #   data:
  #     lightspeed-stack.yaml: |
  #       mcp_servers:
parameters:
- name: MIN_REPLICAS
  value: '3'
- description: Image tag
  name: IMAGE_TAG
  required: true
- description: Image name
  name: IMAGE
  value: quay.io/lightspeed-core/lightspeed-stack
- description: ClowdEnv Name
  name: ENV_NAME
  required: true
- name: VERTEX_PROJECT
  description: GCP project ID for Vertex AI
  required: true
- name: VERTEX_LOCATION
  description: GCP location for Vertex AI
  required: true
- name: ALLOWED_MODEL
  description: Allowed model identifier
  required: true
# TODO: Re-enable when sidecar services are ready
# - description: Embedding service image (unified embeddings + vector storage)
#   name: EMBEDDING_SERVICE_IMAGE
#   value: quay.io/cloudservices/hcc-ai-assistant-embedding-service
# - description: Embedding service image tag
#   name: EMBEDDING_SERVICE_IMAGE_TAG
#   value: latest
# - description: MCP discovery service image
#   name: MCP_DISCOVERY_SERVICE_IMAGE
#   value: quay.io/cloudservices/hcc-ai-assistant-mcp-discovery-service
# - description: MCP discovery service image tag
#   name: MCP_DISCOVERY_SERVICE_IMAGE_TAG
#   value: latest
# - description: ChromaDB vector database PVC size
#   name: CHROMADB_STORAGE_SIZE
#   value: 10Gi
