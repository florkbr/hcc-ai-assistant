version: 2

apis:
- agents
- batches
- datasetio
- eval
- files
- inference
- safety
- scoring
- tool_runtime
- vector_io
      
benchmarks: []
datasets: []
image_name: starter

providers:
  inference:
  - provider_id: google-vertex
    provider_type: remote::vertexai
    config:
      project: ${env.VERTEX_PROJECT}
      location: ${env.VERTEX_LOCATION}
      allowed_models: ["${env.ALLOWED_MODEL}"]
  - config: {}
    provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
  files:
  - config:
      metadata_store:
        table_name: files_metadata
        backend: sql_default
      storage_dir: ${env.STORAGE_DIR}
    provider_id: meta-reference-files
    provider_type: inline::localfs
  safety:
  - config:
      model: ${env.ALLOWED_MODEL}
      excluded_categories: []
    provider_id: gemini-safety
    provider_type: inline::llama-guard
  scoring:
  - provider_id: basic
    provider_type: inline::basic
    config: {}
  - provider_id: llm-as-judge
    provider_type: inline::llm-as-judge
    config: {}
  - provider_id: braintrust
    provider_type: inline::braintrust
    config:
      openai_api_key: '********'
  tool_runtime:
  - config: {} # Enable the RAG tool
    provider_id: rag-runtime
    provider_type: inline::rag-runtime
  # TODO: Move to environment-specific config via ClowdApp params/env vars
  - config:
      url: http://rbac-service.rbac-prod.svc.cluster.local:8000/_private/_a2s/mcp/
    provider_id: rbac-mcp-provider
    provider_type: remote::model-context-protocol
  # Uses localhost since mcp-discovery-service runs as a sidecar in the same pod
  - config:
      url: http://localhost:8001/mcp
    provider_id: mcp-discovery-provider
    provider_type: remote::model-context-protocol
  - config:
      url: http://host.docker.internal:3001
    provider_id: local-mcp-provider
    provider_type: remote::model-context-protocol
  vector_io:
  - config: # Define the storage backend for RAG
      persistence:
        namespace: vector_io::faiss
        backend: kv_default
    provider_id: faiss
    provider_type: inline::faiss
  agents:
  - config:
      persistence:
        agent_state:
          namespace: agents_state
          backend: kv_default
        responses:
          table_name: agents_responses
          backend: sql_default
    provider_id: meta-reference
    provider_type: inline::meta-reference
  batches:
  - config:
      kvstore:
        namespace: batches_store
        backend: kv_default
    provider_id: reference
    provider_type: inline::reference
  datasetio:
  - config:
      kvstore:
        namespace: huggingface_datasetio
        backend: kv_default
    provider_id: huggingface
    provider_type: remote::huggingface
  - config:
      kvstore:
        namespace: localfs_datasetio
        backend: kv_default
    provider_id: localfs
    provider_type: inline::localfs
  eval:
  - config:
      kvstore:
        namespace: eval_store
        backend: kv_default
    provider_id: meta-reference
    provider_type: inline::meta-reference
scoring_fns: []
server:
  port: 8321
storage:
  backends:
    kv_default: # Define the storage backend type for RAG, in this case registry and RAG are unified i.e. information on registered resources (e.g. models, vector_stores) are saved together with the RAG chunks
      type: kv_sqlite
      db_path: ${env.KV_STORE_PATH}
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQL_STORE_PATH}
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
registered_resources:
  models:
    - model_id: ${env.ALLOWED_MODEL}
      provider_id: google-vertex
      provider_model_id: ${env.ALLOWED_MODEL}
  shields:
  - shield_id: gemini-shield
    provider_id: gemini-safety
    provider_shield_id: "google-vertex/${env.ALLOWED_MODEL}"
  vector_stores: []
  datasets: []
  scoring_fns: []
  benchmarks: []
  tool_groups:
  - toolgroup_id: builtin::rag # Register the RAG tool
    provider_id: rag-runtime
vector_stores:
  default_provider_id: faiss
  default_embedding_model: # Define the default embedding model for RAG
    provider_id: sentence-transformers
    model_id: nomic-ai/nomic-embed-text-v1.5
safety:
  default_shield_id: gemini-shield
