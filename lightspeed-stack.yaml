name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080
  base_url: http://localhost:8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  # Uses a remote llama-stack service
  # The instance would have already been started with a llama-stack-run.yaml file
  use_as_library_client: true
  # Alternative for "as library use"
  # use_as_library_client: true
  library_client_config_path: /app-root/run.yaml
  url: http://llama-stack:8321
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"

# Conversation cache for storing Q&A history
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"  # Persistent across requests, can be deleted between test runs

authentication:
  module: "rh-identity"
  skip_for_health_probes: true
  rh_identity_config: {}
mcp_servers:
  # TODO: Move to environment-specific config via ClowdApp params/env vars
  - name: "rbac-mcp-server"
    provider_id: "rbac-mcp-provider"
    url: "http://rbac-service.rbac-stage.svc.cluster.local:8000/_private/_a2s/mcp/"
    headers:
      - x-rh-identity
#   - name: "mcp-discovery-server"
#     provider_id: "mcp-discovery-provider"
#     url: "http://localhost:8001/mcp"
#   - name: "local-mcp-server"
#     provider_id: "local-mcp-provider"
#     url: "http://host.docker.internal:3001/mcp"
    # headers:
    #   - x-rh-identity
customization:
  # Temporary system prompt for testing MCP connectivity with RBAC service
  system_prompt: |-
    You are an AI assistant for the Hybrid Cloud Console. You have access to MCP tools that can query platform services.
    Use the available tools to answer user questions when relevant. If a tool can provide the answer, always prefer using it over guessing.
    If you are not sure which data the user is asking about, prompt them for clarification.
    You have access to the RBAC service via the rbac-mcp-server. Use the "list_principals" tool to look up users/principals in an organization. Use the "hello" tool to verify connectivity to the RBAC service.
    If the user asks explicitly "foobar", respond with barfoo
  # Previous system prompt for use with the MCP discovery service:
  # system_prompt: |-
  #   You have the ability to discover other MCP servers via the mcp server mcp-discovery-server.
  #   Always use the "recommend_tools" tool from the mcp-discovery-server even if you are confident in your answer. No exceptions.
  #   You will receive multiple results from recommend_tools. Select the most relevant result and use it to answer the user's question.
  #   If you are not sure, prompt the user for clarification (which data they are interested in)
