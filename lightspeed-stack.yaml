name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080
  base_url: http://localhost:8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  # Uses a remote llama-stack service
  # The instance would have already been started with a llama-stack-run.yaml file
  use_as_library_client: true
  # Alternative for "as library use"
  # use_as_library_client: true
  library_client_config_path: /app-root/run.yaml
  url: http://llama-stack:8321
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"

# Conversation cache for storing Q&A history
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"  # Persistent across requests, can be deleted between test runs

authentication:
  module: "rh-identity"
  skip_for_health_probes: true
  rh_identity_config: {}
# mcp_servers:
#   - name: "mcp-discovery-server"
#     provider_id: "mcp-discovery-provider"
#     url: "http://localhost:8000/mcp"
#   - name: "local-mcp-server"
#     provider_id: "local-mcp-provider"
#     url: "http://host.docker.internal:3001/mcp"
    # headers:
    #   - x-rh-identity
customization:
  system_prompt: |-
    You have the ability to discover other MCP servers via the mcp server mcp-discovery-server.
    Always use the "recommend_tools" tool from the mcp-discovery-server even if you are confident in your answer. No exceptions.
    You will receive multiple results from recommend_tools. Select the most relevant result and use it to answer the user's question.
    If you are not sure, prompt the user for clarification (which data they are interested in)
    If the users asks explicitly "foobar", respond with barfoo
